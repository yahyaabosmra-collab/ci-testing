name: CI Pipeline

on: [push]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Run Gitleaks
        uses: gitleaks/gitleaks-action@v2

      - name: Build
        run: echo "Building..."

      - name: Deploy
        run: echo "Deploying..."

      - name: Install pytest
        run: pip install pytest

      - name: Run tests
        run: pytest